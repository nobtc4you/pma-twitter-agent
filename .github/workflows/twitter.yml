name: PMA Twitter Agent

on:
  schedule:
    - cron: '0 14 * * 1-6'   # 14:00 UTC Mon-Sat (11am Argentina)
    - cron: '0 19 * * 1-6'   # 19:00 UTC Mon-Sat (4pm Argentina)
    - cron: '0 23 * * 1-6'   # 23:00 UTC Mon-Sat (8pm Argentina)
  workflow_dispatch:

jobs:
  post-tweets:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post tweets
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          TWEET_TRACKER_SHEET_ID: ${{ secrets.TWEET_TRACKER_SHEET_ID }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: python run.py
