name: PMA Twitter Agent

on:
  schedule:
    - cron: '0 15 * * 1-5'   # 15:00 UTC Mon-Fri (12pm Argentina)
  workflow_dispatch:

permissions:
  contents: read
  secrets: write

jobs:
  post-tweets:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post tweets
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          X_CLIENT_ID: ${{ secrets.X_CLIENT_ID }}
          X_CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
          X_REFRESH_TOKEN: ${{ secrets.X_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TWEET_TRACKER_SHEET_ID: ${{ secrets.TWEET_TRACKER_SHEET_ID }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: python run.py
